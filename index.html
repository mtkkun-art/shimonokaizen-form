<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>改善提案書</title>
<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; }
input, textarea { width:100%; margin-bottom:15px; padding:8px; }
button { padding:12px; width:100%; font-size:16px; margin-bottom:10px; }
h2 { text-align:center; }
</style>
</head>
<body>

<h2>改善提案書</h2>

<label>氏名:</label>
<input type="text" id="name">

<label>件名:</label>
<input type="text" id="title">

<label>改善内容:</label>
<textarea id="content" rows="5"></textarea>

<label>効果:</label>
<textarea id="effect" rows="4"></textarea>

<button onclick="sendMail()">📧 メールで送信する</button>

<script>
function sendMail() {
    const name = document.getElementById("name").value;
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    const effect = document.getElementById("effect").value;

    const subject = encodeURIComponent("改善提案書 - " + title);

    const body = encodeURIComponent(
`改善提案書
--------------------------
氏名: ${name}
件名: ${title}

改善内容:
${content}

効果:
${effect}

提出日: ${new Date().toLocaleDateString()}
`
    );

    window.location.href = `mailto:phamkhackhung89@gmail.com?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
